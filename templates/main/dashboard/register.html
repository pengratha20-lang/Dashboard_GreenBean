<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Green Bean Smart Admin</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root {
            --primary: #22a54a;
            --grad: linear-gradient(135deg, #155724 0%, #22a54a 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Abstract Background Elements */
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.12;
            z-index: -1;
            border-radius: 50%;
        }

        .blob-1 { top: -200px; left: -100px; }
        .blob-2 { bottom: -200px; right: -100px; animation: float 12s infinite alternate; }

        @keyframes float {
            from { transform: translate(0,0); }
            to { transform: translate(-40px, -40px); }
        }

        .auth-card-premium {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 36px;
            width: 100%;
            max-width: 480px;
            padding: 50px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-icon-box {
            width: 56px;
            height: 56px;
            background: var(--grad);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 15px;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .auth-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper-p {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrapper-p i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.2s;
        }

        .input-p {
            width: 100%;
            padding: 13px 18px 13px 48px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-main);
        }

        .input-p:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(34, 165, 74, 0.1);
        }

        .input-p:focus + i {
            color: var(--primary);
        }

        .btn-auth-p {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            background: var(--grad);
            color: white;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px -5px rgba(34, 165, 74, 0.3);
            margin-top: 10px;
        }

        .btn-auth-p:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(34, 165, 74, 0.4);
        }

        .error-toast {
            background: #fff1f2;
            color: #e11d48;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid #fecdd3;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.875rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-card-premium">
        <div class="brand-section">
            <div class="brand-icon-box"><i class="fas fa-id-card"></i></div>
            <h2 class="brand-name">Join the Collective</h2>
            <p style="color: #64748b; margin-top: 5px; font-weight: 500;">Secure Admin Registration</p>
        </div>

        {% if request.args.get('message') %}
        <div class="error-toast">
            <i class="fas fa-exclamation-triangle"></i>
            <span>{{ request.args.get('message') }}</span>
        </div>
        {% endif %}

        <form method="POST" id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label class="auth-label">Public Handle</label>
            <div class="input-wrapper-p">
                <i class="fas fa-at"></i>
                <input type="text" id="username" name="username" class="input-p" required placeholder="Choose username">
            </div>

            <label class="auth-label">Secure Email</label>
            <div class="input-wrapper-p">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" class="input-p" required placeholder="name@company.com">
            </div>

            <label class="auth-label">Access Key</label>
            <div class="input-wrapper-p">
                <i class="fas fa-key"></i>
                <input type="password" id="password" name="password" class="input-p" required placeholder="Create strong password">
            </div>

            <label class="auth-label">Identity Match</label>
            <div class="input-wrapper-p">
                <i class="fas fa-shield-halved"></i>
                <input type="password" id="confirm_password" name="confirm_password" class="input-p" required placeholder="Verify password">
            </div>

            <button type="submit" class="btn-auth-p">
                Initiate Enrollment <i class="fas fa-user-check"></i>
            </button>
        </form>

        <p class="footer-text">
            Already verified? <a href="{{ url_for('admin_auth_page.login') }}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Secure Login</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function cleanupBlockingLayers() {
            document.body.classList.remove('swal2-shown', 'swal2-height-auto', 'modal-open');
            document.body.style.removeProperty('overflow');
            document.body.style.removeProperty('padding-right');
            document.querySelectorAll('.swal2-container, .modal-backdrop, .loading-overlay').forEach(el => el.remove());

            Array.from(document.body.children).forEach(el => {
                if (!el || !el.classList) return;
                if (el.matches('.auth-card-premium, .blob, script, style')) return;

                const style = window.getComputedStyle(el);
                if (style.position !== 'fixed') return;

                const rect = el.getBoundingClientRect();
                const coversScreen = rect.width >= window.innerWidth * 0.95 &&
                                     rect.height >= window.innerHeight * 0.95 &&
                                     rect.top <= 2 && rect.left <= 2;
                const z = parseInt(style.zIndex || '0', 10);
                const canBlock = style.pointerEvents !== 'none';
                const className = (el.className || '').toString().toLowerCase();
                const overlayLike = className.includes('overlay') || className.includes('backdrop');

                if (coversScreen && canBlock && (z >= 999 || overlayLike)) {
                    el.remove();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            cleanupBlockingLayers();

            window.addEventListener('contextmenu', function (event) {
                event.stopImmediatePropagation();
            }, true);
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (pass !== confirm) {
                e.preventDefault();
                Swal.fire({
                    icon: 'error',
                    title: 'Password Mismatch',
                    text: 'Passwords do not match. Please re-enter them carefully.',
                    backdrop: false,
                    confirmButtonColor: '#dc2626'
                });
                return;
            }

            if (pass.length < 8) {
                e.preventDefault();
                Swal.fire({
                    icon: 'warning',
                    title: 'Password Too Short',
                    text: 'Passwords must be at least 8 characters long.',
                    backdrop: false,
                    confirmButtonColor: '#22a54a'
                });
                return;
            }

            const btn = this.querySelector('.btn-auth-p');
            btn.innerHTML = '<i class="fas fa-dna fa-spin"></i> Processing...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
