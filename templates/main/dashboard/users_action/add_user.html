{% extends "dashboard/base.html" %}

{% block title %}Add User - Green Bean Admin{% endblock %}

{% block content %}
<style>
    :root {
        --primary-green: #22a54a;
        --dark-green: #155724;
        --accent-green: #1aa179;
        --text-dark: #1a1a1a;
        --text-secondary: #495057;
        --bg-light: #f8f9fa;
        --border-color: #d1d5db;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .content-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .content-header h1 {
        font-size: 2rem;
        color: var(--text-dark);
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .content-header i {
        color: var(--primary-green);
        font-size: 2.5rem;
    }

    .form-container {
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 30px;
        max-width: 100%;
        margin: -10px 0 25px 0px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-dark);
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        background-color: white;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 3px rgba(34, 165, 74, 0.1);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 120px;
    }

    .image-upload-group {
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .image-upload-group:hover {
        border-color: var(--primary-green);
        background-color: var(--bg-light);
    }

    .image-upload-group input[type="file"] {
        display: none;
    }

    .image-upload-label {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .image-upload-label i {
        font-size: 2rem;
        color: var(--primary-green);
    }

    .image-preview {
        margin-top: 15px;
        text-align: center;
    }

    .image-preview img {
        max-width: 150px;
        max-height: 150px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
    }

    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 30px;
    }

    .btn {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        text-align: center;
        display: inline-block;
    }

    .btn-submit {
        background-color: var(--primary-green);
        color: white;
    }

    .btn-submit:hover {
        background-color: var(--dark-green);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34, 165, 74, 0.3);
    }

    .btn-cancel {
        background-color: var(--bg-light);
        color: var(--text-dark);
        border: 1px solid var(--border-color);
    }

    .btn-cancel:hover {
        background-color: var(--border-color);
    }

    .alert {
        padding: 15px 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .alert-error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    .required {
        color: #d32f2f;
    }
</style>


{% if request.args.get('message') %}
<div class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i>
    {{ request.args.get('message') }}
</div>
{% endif %}

<div class="form-container">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="username">Username <span class="required">*</span></label>
            <input type="text" id="username" name="username" required placeholder="Enter username">
        </div>

        <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" required placeholder="Enter email address">
        </div>

        <div class="form-group">
            <label for="password">Password <span class="required">*</span></label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>

        <div class="form-group">
            <label for="profile_pic">Profile Picture</label>
            <div class="image-upload-group" id="imageUpload">
                <label for="profile_pic" class="image-upload-label">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Click to upload or drag and drop</span>
                    <small>PNG, JPG, GIF up to 10MB</small>
                </label>
                <input type="file" id="profile_pic" name="profile_pic" accept="image/*">
            </div>
            <div class="image-preview" id="imagePreview"></div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('user_module.users_route') }}" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-submit">Add User</button>
        </div>
    </form>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const fileInput = document.getElementById('profile_pic');
    const imagePreview = document.getElementById('imagePreview');

    imageUpload.addEventListener('dragover', (e) => {
        e.preventDefault();
        imageUpload.style.borderColor = 'var(--primary-green)';
        imageUpload.style.backgroundColor = 'var(--bg-light)';
    });

    imageUpload.addEventListener('dragleave', () => {
        imageUpload.style.borderColor = 'var(--border-color)';
        imageUpload.style.backgroundColor = 'white';
    });

    imageUpload.addEventListener('drop', (e) => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;
        displayPreview();
    });

    fileInput.addEventListener('change', displayPreview);

    function displayPreview() {
        const file = fileInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        }
    }
</script>
{% endblock %}
