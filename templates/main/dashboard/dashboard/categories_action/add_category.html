{% extends "base.html" %}

{% block title %}Add Category - Green Bean Admin{% endblock %}

{% block content %}
<style>
    :root {
        --primary-green: #22a54a;
        --dark-green: #155724;
        --accent-green: #1aa179;
        --text-dark: #1a1a1a;
        --text-secondary: #495057;
        --bg-light: #f8f9fa;
        --border-color: #d1d5db;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .breadcrumb {
        background-color: transparent;
        padding: 0 0 20px 0;
    }

    .breadcrumb-item.active {
        color: var(--text-secondary);
    }

    .breadcrumb-item a {
        color: var(--primary-green);
        text-decoration: none;
    }

    .breadcrumb-item a:hover {
        text-decoration: underline;
    }

    .form-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 30px;
        margin-bottom: 20px;
    }

    .form-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: #000000;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .form-title i {
        color: var(--primary-green);
    }

    .form-label {
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
    }

    .form-control,
    .form-select {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 0.95rem;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 0.2rem rgba(34, 165, 74, 0.25);
        outline: none;
    }

    .form-control::placeholder {
        color: #adb5bd;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-row.full {
        grid-template-columns: 1fr;
    }

    .image-preview {
        width: 100%;
        max-width: 300px;
        height: 300px;
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-light);
        margin-top: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .image-preview:hover {
        border-color: var(--primary-green);
        background-color: #f0f8f5;
    }

    .image-preview.has-image {
        border: none;
        background: transparent;
    }

    .image-preview img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
    }

    .image-preview-placeholder {
        text-align: center;
        color: #999;
    }

    .image-preview-placeholder i {
        font-size: 3rem;
        margin-bottom: 10px;
        color: var(--primary-green);
    }

    .form-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
    }

    .btn {
        padding: 10px 20px;
        border-radius: 6px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.95rem;
    }

    .btn-primary {
        background: var(--primary-green);
        color: white;
    }

    .btn-primary:hover {
        background: var(--dark-green);
    }

    .btn-secondary {
        background: #e9ecef;
        color: #495057;
    }

    .btn-secondary:hover {
        background: #dee2e6;
    }

    .help-text {
        font-size: 0.85rem;
        color: #6c757d;
        margin-top: 5px;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-card {
            padding: 20px;
        }

        .form-actions {
            flex-direction: column;
        }

        .btn {
            width: 100%;
        }
    }
</style>

<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('category_module.categories_route') }}">Categories</a></li>
        <li class="breadcrumb-item active">Add Category</li>
    </ol>
</nav>

<div class="form-card">
    <h2 class="form-title">
        <i class="fas fa-plus-circle"></i> Add New Category
    </h2>
    <form method="POST" action="{{ url_for('category_module.add_category_route') }}">
        <!-- Category Name -->
        <div class="form-group">
            <label class="form-label">Category Name *</label>
            <input type="text" class="form-control" name="category_name" placeholder="Enter category name" required>
        </div>

        <!-- Description -->
        <div class="form-group form-row full">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4" placeholder="Enter category description..."></textarea>
        </div>

        <!-- Category Icon -->
        <div class="form-group">
            <label class="form-label">Category Icon</label>
            <select class="form-select" name="icon" required>
                <option value="">Select an icon</option>
                <option value="fa-leaf">Leaf (Indoor Plants)</option>
                <option value="fa-clover">Clover (Outdoor)</option>
                <option value="fa-boxes">Boxes (Accessories)</option>
                <option value="fa-jar">Jar (Pots & Planters)</option>
                <option value="fa-droplet">Droplet (Water & Nutrients)</option>
                <option value="fa-sun">Sun (Lighting)</option>
            </select>
            <div class="help-text">Select an icon to represent this category</div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <a href="{{ url_for('category_module.categories_route') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Add Category
            </button>
        </div>
    </form>
</div>

<script>
// Show success/error messages from redirect
window.addEventListener('load', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const message = urlParams.get('message');
    const type = urlParams.get('type');
    
    if (message && typeof Swal !== 'undefined') {
        Swal.fire({
            title: type === 'success' ? 'Success!' : 'Error!',
            text: message,
            icon: type === 'success' ? 'success' : 'error',
            confirmButtonColor: '#22a54a',
            confirmButtonText: 'OK'
        }).then(() => {
            // Redirect to categories page after alert
            if (type === 'success') {
                window.location.href = "{{ url_for('category_module.categories_route') }}";
            }
        });
        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
    }
});
</script>

{% endblock %}
