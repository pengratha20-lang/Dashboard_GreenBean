{% extends "base.html" %}

{% block title %}Add Product - Green Bean Admin{% endblock %}

{% block content %}
<style>
    :root {
        --primary-green: #22a54a;
        --dark-green: #155724;
        --accent-green: #1aa179;
        --text-dark: #1a1a1a;
        --text-secondary: #495057;
        --bg-light: #f8f9fa;
        --border-color: #d1d5db;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .breadcrumb {
        background-color: transparent;
        padding: 0 0 20px 0;
    }

    .breadcrumb-item.active {
        color: var(--text-secondary);
    }

    .breadcrumb-item a {
        color: var(--primary-green);
        text-decoration: none;
    }

    .breadcrumb-item a:hover {
        text-decoration: underline;
    }

    .form-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 30px;
        margin-bottom: 20px;
    }

    .form-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: #000000;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .form-title i {
        color: var(--primary-green);
    }

    .form-label {
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
    }

    .form-control,
    .form-select {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 0.95rem;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 0.2rem rgba(34, 165, 74, 0.25);
        outline: none;
    }

    .form-control::placeholder {
        color: #adb5bd;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-row.full {
        grid-template-columns: 1fr;
    }

    .image-preview {
        width: 100%;
        max-width: 300px;
        height: 300px;
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-light);
        margin-top: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .image-preview:hover {
        border-color: var(--primary-green);
        background-color: #f0f8f5;
    }

    .image-preview.has-image {
        border: none;
        background: transparent;
    }

    .image-preview img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
    }

    .image-preview-placeholder {
        text-align: center;
        color: #999;
    }

    .image-preview-placeholder i {
        font-size: 3rem;
        margin-bottom: 10px;
        color: var(--primary-green);
    }

    .form-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
    }

    .btn {
        padding: 10px 20px;
        border-radius: 6px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.95rem;
    }

    .btn-primary {
        background: var(--primary-green);
        color: white;
    }

    .btn-primary:hover {
        background: var(--dark-green);
    }

    .btn-secondary {
        background: #e9ecef;
        color: #495057;
    }

    .btn-secondary:hover {
        background: #dee2e6;
    }

    .help-text {
        font-size: 0.85rem;
        color: #6c757d;
        margin-top: 5px;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .form-card {
            padding: 20px;
        }

        .form-actions {
            flex-direction: column;
        }

        .btn {
            width: 100%;
        }
    }
</style>

<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('product_module.products_route') }}">Products</a></li>
        <li class="breadcrumb-item active">Add Product</li>
    </ol>
</nav>

<div class="form-card">
    <form method="POST" enctype="multipart/form-data" action="{{ url_for('product_module.add_product') }}">
        <!-- Product Name -->
        <div class="form-group">
            <label class="form-label">Product Name *</label>
            <input type="text" class="form-control" name="product_name" placeholder="Enter product name" required>
        </div>
        <!-- Category and Price -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Category *</label>
                <select class="form-select" name="category_id" required>
                    <option value="">Select category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.category_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Price *</label>
                <input type="number" class="form-control" name="price" placeholder="0.00" step="0.01" required>
            </div>
        </div>

        <!-- Stock and Status -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Stock Quantity *</label>
                <input type="number" class="form-control" name="stock" placeholder="0" min="0" required>
                <div class="help-text">The number of items in stock</div>
            </div>
            <div class="form-group">
                <label class="form-label">Status *</label>
                <select class="form-select" name="status" required>
                    <option value="instock" selected>In Stock</option>
                </select>
            </div>
        </div>

        <!-- Description -->
        <div class="form-group form-row full">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4" placeholder="Enter product description..."></textarea>
        </div>

        <!-- Product Image -->
        <div class="form-group">
            <label class="form-label">Product Image</label>
            <div class="image-preview" id="imagePreview">
                <div class="image-preview-placeholder">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload or drag and drop</p>
                </div>
            </div>
            <input type="file" class="form-control" id="imageInput" name="image" accept="image/*" style="display: none;">
            <div class="help-text">JPG, PNG, GIF up to 5MB</div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <a href="{{ url_for('product_module.products_route') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Add Product
            </button>
        </div>
    </form>
</div>

<script>
    // Ensure DOM is fully loaded before initializing image preview
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            setupImagePreview('imagePreview', 'imageInput');
        });
    } else {
        setupImagePreview('imagePreview', 'imageInput');
    }
</script>

{% endblock %}
