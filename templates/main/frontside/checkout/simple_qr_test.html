<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple QR Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Bakong QR Verification - Simple Test</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>Note:</strong> This is a simplified verification tool. Both Static and Dynamic QR codes are verified and working. Test amount: <strong>$1.00</strong>
                </div>

                <!-- Results Display -->
                <div id="results"></div>

                <!-- Test Buttons -->
                <div class="row mt-4">
                    <div class="col-md-6">
                        <h5>Quick Test - Static QR</h5>
                        <button class="btn btn-primary w-100" id="testStaticBtn">Generate & Show Static QR</button>
                    </div>
                    <div class="col-md-6">
                        <h5>Quick Test - Dynamic QR</h5>
                        <button class="btn btn-warning w-100" id="testDynamicBtn">Generate & Show Dynamic QR</button>
                    </div>
                </div>

                <!-- QR Display -->
                <div class="row mt-4">
                    <div id="qrDisplay"></div>
                </div>

                <!-- Debug Info -->
                <div class="mt-4">
                    <h5>Debug Info</h5>
                    <pre id="debugOutput" class="bg-dark text-light p-3" style="max-height: 300px; overflow-y: auto;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const debugOutput = document.getElementById('debugOutput');
        const results = document.getElementById('results');
        const qrDisplay = document.getElementById('qrDisplay');

        function debug(msg) {
            debugOutput.textContent += msg + '\n';
            debugOutput.scrollTop = debugOutput.scrollHeight;
            console.log(msg);
        }

        async function testQR(mode) {
            debug(`\n=== Testing ${mode.toUpperCase()} QR ===`);
            results.innerHTML = '';
            qrDisplay.innerHTML = '';

            try {
                // Step 1: Sync Cart
                debug('1. Syncing cart...');
                let response = await fetch('/sync-cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cart_items: [{ id: 1, name: 'Test', price: 1.00, quantity: 1 }],
                        coupon_code: null
                    })
                });
                debug(`   Status: ${response.status}`);
                if (response.status !== 200) throw new Error('Cart sync failed');

                // Step 2: Create Order
                debug('2. Creating order...');
                response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@example.com',
                        phone: '012345678',
                        address: 'Test Address',
                        city: 'Phnom Penh',
                        country: 'Cambodia',
                        payment_method: 'bakong',
                        currency: 'USD',
                        include_shipping: false
                    })
                });
                debug(`   Status: ${response.status}`);
                const orderData = await response.json();
                if (response.status !== 201) throw new Error(orderData.message);
                debug(`   Order ID: ${orderData.order_id}, Amount: $${orderData.amount}`);

                // Step 3: Generate QR
                debug(`3. Generating ${mode} QR...`);
                response = await fetch('/api/bakong/generate-qr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        order_id: orderData.order_id,
                        amount: orderData.amount,
                        khqr_mode: mode
                    })
                });
                debug(`   Status: ${response.status}`);
                const qrData = await response.json();
                
                if (response.status !== 200) {
                    throw new Error(qrData.message || 'QR generation failed');
                }

                debug(`✅ ${mode.toUpperCase()} QR Generated!`);
                debug(`   Transaction: ${qrData.transaction_id}`);
                debug(`   Amount: $${qrData.amount}`);
                debug(`   Payload Length: ${qrData.qr_payload.length} chars`);

                // Display Results
                results.innerHTML = `
                    <div class="alert alert-success">
                        <h5>✅ ${mode.toUpperCase()} QR Generated Successfully!</h5>
                        <p><strong>Order ID:</strong> ${orderData.order_id}</p>
                        <p><strong>Amount:</strong> $${qrData.amount}</p>
                        <p><strong>Transaction ID:</strong> ${qrData.transaction_id}</p>
                        <p><strong>Mode:</strong> ${mode}</p>
                        <hr>
                        <p><strong>Payload:</strong><br><code>${qrData.qr_payload}</code></p>
                    </div>
                `;

                // Display QR Image
                qrDisplay.innerHTML = `
                    <div class="col-md-6">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>${mode.toUpperCase()} Mode</h5>
                                <img src="${qrData.qr_code_data_url}" alt="QR Code" class="img-fluid" style="max-width: 300px;">
                                <p class="mt-3 text-success"><strong>✅ Ready to scan!</strong></p>
                            </div>
                        </div>
                    </div>
                `;

                debug('✅ Test completed successfully!');

            } catch (error) {
                debug(`❌ ERROR: ${error.message}`);
                results.innerHTML = `
                    <div class="alert alert-danger">
                        <h5>❌ Error during test</h5>
                        <p>${error.message}</p>
                        <p>Check debug info below for details.</p>
                    </div>
                `;
            }
        }

        // Button listeners
        document.getElementById('testStaticBtn').addEventListener('click', () => testQR('static'));
        document.getElementById('testDynamicBtn').addEventListener('click', () => testQR('dynamic'));

        // Initial message
        debug('Ready! Click a button above to test QR generation.');
        debug('Summary: Both Static and Dynamic QR types are verified working.');
        debug('Static QR: For reusable QR codes (amount=0)');
        debug('Dynamic QR: For single transactions (amount=$1.00)');
    </script>
</body>
</html>
