<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard - Green Bean Admin{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-dashboard.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">
    <div class="dashboard-container" style="flex: 1 0 auto; display: flex; min-height: 100vh;">
        <!-- SIDEBAR -->
        {% include 'components/sidebar.html' %}
        <!-- MAIN CONTENT -->
        <main class="main-content" style="flex: 1 1 auto; display: flex; flex-direction: column; min-height: 100vh;">
            <!-- TOP BAR -->
            {% include 'components/topbar.html' %}
            <!-- PAGE CONTENT -->
            <div class="content-area" style="flex: 1 1 auto;">
                {% block content %}{% endblock %}
            </div>
            <!-- FOOTER -->
            {% include 'components/footer.html' %}
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    
    <!-- Chart Utilities -->
    <script src="{{ url_for('static', filename='js/charts-utils.js') }}"></script>
    
    <!-- Common JS Functions -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    
    <!-- Dashboard JS -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    
    <!-- Flash Messages Handler -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check for success message in page
            const urlParams = new URLSearchParams(window.location.search);
            const message = urlParams.get('message');
            const messageType = urlParams.get('type');
            
            console.log('🔍 DOMContentLoaded - Message:', message, 'Type:', messageType);
            
            if (message && messageType) {
                console.log('✅ Calling showAlert with:', messageType, message);
                showAlert(messageType, message);
                // Clean URL to remove query parameters
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
        
        function showAlert(type, message) {
            console.log('🚨 showAlert called - Type:', type, 'Message:', message);
            const isAutoClose = type === 'success' || type === 'info';
            
            const config = {
                icon: type === 'success' ? 'success' : type === 'error' ? 'error' : 'info',
                title: type === 'success' ? 'Success!' : type === 'error' ? 'Error!' : 'Info',
                text: message,
                background: '#fff',
                backdrop: true,
                allowOutsideClick: true,
                allowEscapeKey: true,
                didOpen: (modal) => {
                    console.log('✅ Alert opened');
                }
            };
            
            if (isAutoClose) {
                config.timer = 2000;
                config.timerProgressBar = true;
                config.showConfirmButton = false;
            } else {
                config.showConfirmButton = true;
                config.confirmButtonText = 'OK';
                config.confirmButtonColor = type === 'error' ? '#d32f2f' : '#22a54a';
            }
            
            return Swal.fire(config);
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
