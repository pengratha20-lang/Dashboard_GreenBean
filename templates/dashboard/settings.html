{% extends "base.html" %}

{% block title %}Store Settings - Green Bean Admin{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>

<style>
    :root {
        --primary-green: #22a54a;
        --dark-green: #155724;
        --text-dark: #1a1a1a;
        --text-secondary: #495057;
        --bg-light: #f8f9fa;
        --border-color: #d1d5db;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .page-header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        margin-bottom: 30px;
    }

    .page-title {
        font-size: 1.3rem;
        font-weight: 800;
        color: #000000;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .page-title i {
        color: var(--primary-green);
    }

    .settings-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 30px;
    }

    .settings-section {
        margin-bottom: 30px;
        padding-bottom: 30px;
        border-bottom: 1px solid var(--border-color);
    }

    .settings-section:last-child {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
    }

    .section-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #000000;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .section-title i {
        color: var(--primary-green);
        width: 24px;
    }

    .form-label {
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
    }

    .form-control, .form-select {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 0.95rem;
    }

    .form-control:focus, .form-select:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 3px rgba(34, 165, 74, 0.1);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 15px;
    }

    .form-row.full {
        grid-template-columns: 1fr;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }

    .form-group {
        margin-bottom: 15px;
    }

    .button-group {
        display: flex;
        gap: 12px;
        margin-top: 30px;
        justify-content: flex-end;
    }

    .btn-save {
        padding: 12px 28px;
        background: var(--primary-green);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-save:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34, 165, 74, 0.3);
    }

    .btn-save:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
    }

    .btn-cancel {
        padding: 12px 28px;
        background: transparent;
        color: #6c757d;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .btn-cancel:hover {
        background: var(--bg-light);
        border-color: #999;
    }

    .help-text {
        font-size: 0.85rem;
        color: #6c757d;
        margin-top: 4px;
    }

    .input-group {
        position: relative;
    }

    .input-group-prepend {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--primary-green);
        pointer-events: none;
    }

    .form-control.with-icon {
        padding-left: 35px;
    }
</style>

<div class="main-content">
    <div class="page-header">
        <div class="page-title">
            <i class="fas fa-cog"></i>
            Store Settings
        </div>
    </div>

    <div class="settings-card">
        <form id="settingsForm">
            <!-- Store Information Section -->
            <div class="settings-section">
                <div class="section-title">
                    <i class="fas fa-store"></i> Store Information
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Store Name</label>
                        <input type="text" class="form-control" name="store_name" id="store_name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Store Email</label>
                        <input type="email" class="form-control" name="store_email" id="store_email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Store Phone</label>
                        <input type="tel" class="form-control" name="store_phone" id="store_phone">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Logo URL</label>
                        <input type="url" class="form-control" name="logo_url" id="logo_url" placeholder="https://example.com/logo.png">
                    </div>
                </div>
                <div class="form-row full">
                    <div class="form-group">
                        <label class="form-label">Store Address</label>
                        <input type="text" class="form-control" name="store_address" id="store_address">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" name="store_city" id="store_city">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control" name="store_country" id="store_country">
                    </div>
                </div>
            </div>

            <!-- Business Settings Section -->
            <div class="settings-section">
                <div class="section-title">
                    <i class="fas fa-sliders-h"></i> Business Settings
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Currency</label>
                        <select class="form-select" name="currency" id="currency">
                            <option value="USD">USD - US Dollar</option>
                            <option value="EUR">EUR - Euro</option>
                            <option value="GBP">GBP - British Pound</option>
                            <option value="JPY">JPY - Japanese Yen</option>
                            <option value="AUD">AUD - Australian Dollar</option>
                            <option value="CAD">CAD - Canadian Dollar</option>
                            <option value="SGD">SGD - Singapore Dollar</option>
                            <option value="HKD">HKD - Hong Kong Dollar</option>
                            <option value="CHF">CHF - Swiss Franc</option>
                            <option value="CNY">CNY - Chinese Yuan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Language</label>
                        <select class="form-select" name="language" id="language">
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="it">Italian</option>
                            <option value="pt">Portuguese</option>
                            <option value="ja">Japanese</option>
                            <option value="zh">Chinese</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Timezone</label>
                        <select class="form-select" name="timezone" id="timezone">
                            <option value="UTC">UTC</option>
                            <option value="EST">Eastern Standard Time (EST)</option>
                            <option value="CST">Central Standard Time (CST)</option>
                            <option value="MST">Mountain Standard Time (MST)</option>
                            <option value="PST">Pacific Standard Time (PST)</option>
                            <option value="GMT">GMT</option>
                            <option value="CET">Central European Time (CET)</option>
                            <option value="JST">Japan Standard Time (JST)</option>
                            <option value="AEST">Australian Eastern Standard Time (AEST)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tax Rate (%)</label>
                        <input type="number" class="form-control" name="tax_rate" id="tax_rate" min="0" max="100" step="0.01">
                        <div class="help-text">Enter as percentage (e.g., 8.5 for 8.5%)</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Shipping Cost ($)</label>
                        <input type="number" class="form-control" name="shipping_cost" id="shipping_cost" min="0" step="0.01" placeholder="0.00">
                        <div class="help-text">Base shipping cost for orders</div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="button" class="btn-cancel" onclick="resetForm()">
                    <i class="fas fa-times"></i> Reset
                </button>
                <button type="button" class="btn-save" onclick="saveSettings()">
                    <i class="fas fa-save"></i> Save Settings
                </button>
            </div>
        </form>
    </div>
</div>

<script type="application/json" id="settingData">
{{ setting | tojson }}
</script>

{% endblock %}

{% block extra_js %}
<script>
    let originalSettings = {};

    document.addEventListener('DOMContentLoaded', function() {
        const data = document.getElementById('settingData').textContent;
        const settings = JSON.parse(data);
        loadSettings(settings);
    });

    function loadSettings(settings) {
        // Store original values for reset
        originalSettings = { ...settings };

        // Populate form fields
        document.getElementById('store_name').value = settings.store_name || '';
        document.getElementById('store_email').value = settings.store_email || '';
        document.getElementById('store_phone').value = settings.store_phone || '';
        document.getElementById('store_address').value = settings.store_address || '';
        document.getElementById('store_city').value = settings.store_city || '';
        document.getElementById('store_country').value = settings.store_country || '';
        document.getElementById('currency').value = settings.currency || 'USD';
        document.getElementById('language').value = settings.language || 'en';
        document.getElementById('timezone').value = settings.timezone || 'UTC';
        document.getElementById('tax_rate').value = settings.tax_rate || 0;
        document.getElementById('shipping_cost').value = settings.shipping_cost || 0;
        document.getElementById('logo_url').value = settings.logo_url || '';
    }

    function saveSettings() {
        const form = document.getElementById('settingsForm');
        const formData = new FormData(form);

        // Show loading state
        const btnSave = event.target;
        const originalText = btnSave.innerHTML;
        btnSave.disabled = true;
        btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

        fetch('{{ url_for("settings_module.update_settings") }}', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            btnSave.disabled = false;
            btnSave.innerHTML = originalText;

            if (data.success) {
                Swal.fire({
                    title: 'Success!',
                    text: 'Settings saved successfully!',
                    icon: 'success',
                    toast: true,
                    position: 'top-right',
                    timer: 3000,
                    timerProgressBar: true,
                    showConfirmButton: false
                });
                // Update original settings for reset
                originalSettings = Object.fromEntries(formData);
            } else {
                Swal.fire({
                    title: 'Error!',
                    text: data.message || 'Error saving settings',
                    icon: 'error',
                    toast: true,
                    position: 'top-right',
                    timer: 3000,
                    timerProgressBar: true,
                    showConfirmButton: false
                });
            }
        })
        .catch(error => {
            btnSave.disabled = false;
            btnSave.innerHTML = originalText;
            Swal.fire({
                title: 'Error!',
                text: 'Error saving settings',
                icon: 'error',
                toast: true,
                position: 'top-right',
                timer: 3000,
                timerProgressBar: true,
                showConfirmButton: false
            });
        });
    }

    function resetForm() {
        loadSettings(originalSettings);
        Swal.fire({
            title: 'Reset!',
            text: 'Form reset to last saved values',
            icon: 'info',
            toast: true,
            position: 'top-right',
            timer: 2000,
            timerProgressBar: true,
            showConfirmButton: false
        });
    }
</script>
{% endblock %}
