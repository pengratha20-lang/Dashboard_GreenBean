{% extends "base.html" %}

{% block title %}Customer Management - Green Bean Admin{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>

<style>
    :root {
        --primary-green: #22a54a;
        --dark-green: #155724;
        --light-green: #d4edda;
        --accent-green: #1aa179;
        --text-dark: #1a1a1a;
        --text-secondary: #495057;
        --bg-light: #f8f9fa;
        --border-color: #d1d5db;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .page-header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
    }

    .page-title {
        font-size: 1.3rem;
        font-weight: 800;
        color: #000000;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .page-title i {
        color: var(--primary-green);
    }

    .btn-add {
        padding: 10px 20px;
        background: var(--primary-green);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .btn-add:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34, 165, 74, 0.3);
    }

    .table-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 0;
        overflow: hidden;
    }

    .table {
        margin-bottom: 0;
        font-size: 0.93rem;
    }

    .table thead th {
        background-color: var(--bg-light);
        border: none;
        color: #000000;
        font-weight: 700;
        padding: 12px;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
    }

    .table tbody td {
        padding: 12px;
        vertical-align: middle;
        border-bottom: 1px solid var(--border-color);
    }

    .table tbody tr:hover {
        background-color: var(--bg-light);
    }

    .customer-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, var(--primary-green), var(--accent-green));
        margin-right: 10px;
    }

    .customer-info {
        display: flex;
        align-items: center;
    }

    .action-buttons {
        display: flex;
        gap: 8px;
    }

    .btn-icon {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .btn-edit {
        background: #e3f2fd;
        color: #1976d2;
    }

    .btn-edit:hover {
        background: #bbdefb;
        transform: translateY(-2px);
    }

    .btn-delete {
        background: #ffebee;
        color: #c62828;
    }

    .btn-delete:hover {
        background: #ffcdd2;
        transform: translateY(-2px);
    }

    .modal-header {
        background: var(--primary-green);
        color: white;
        border: none;
    }

    .modal-header .btn-close {
        filter: brightness(0) invert(1);
    }

    .form-label {
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
    }

    .btn-primary {
        background: var(--primary-green);
        border: none;
    }

    .btn-primary:hover {
        background: var(--dark-green);
    }

    .alert {
        margin-bottom: 15px;
    }

    .empty-state {
        text-align: center;
        padding: 40px;
        color: #6c757d;
    }

    .empty-state i {
        font-size: 3rem;
        margin-bottom: 15px;
        opacity: 0.5;
    }
</style>

<div class="main-content">
    <div class="page-header">
        <div class="page-title">
            <i class="fas fa-users"></i>
            Customer Management
        </div>
        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
            <i class="fas fa-user-plus"></i> Add Customer
        </button>
    </div>

    <div id="alertContainer"></div>

    <div class="table-card">
        <table class="table" id="customerTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>Orders</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="customerTableBody">
                <tr><td colspan="7" class="text-center py-4">Loading customers...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus"></i> Add New Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addCustomerForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" name="phone" placeholder="+1 (555) 123-4567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" name="address" placeholder="Street address">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" name="city" placeholder="New York">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Country</label>
                            <input type="text" class="form-control" name="country" placeholder="USA">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Customer Modal -->
<div class="modal fade" id="editCustomerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editCustomerForm">
                    <input type="hidden" id="editCustomerId" name="id">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="editEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" name="phone" id="editPhone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" name="address" id="editAddress">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" name="city" id="editCity">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Country</label>
                            <input type="text" class="form-control" name="country" id="editCountry">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateCustomer()">Update Customer</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal - No longer needed with SweetAlert2 -->

<script type="application/json" id="customersData">
{{ customers | tojson }}
</script>

{% endblock %}

{% block extra_js %}
<script>
    let customers = [];

    document.addEventListener('DOMContentLoaded', function() {
        const data = document.getElementById('customersData').textContent;
        customers = JSON.parse(data);
        renderTable();
    });

    function renderTable() {
        const tbody = document.getElementById('customerTableBody');
        
        if (customers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4"><div class="empty-state"><i class="fas fa-users"></i><p>No customers yet. Click "Add Customer" to get started.</p></div></td></tr>';
            return;
        }

        tbody.innerHTML = customers.map(customer => `
            <tr>
                <td>
                    <div class="customer-info">
                        <div class="customer-avatar">${getInitials(customer.name)}</div>
                        <strong>${customer.name}</strong>
                    </div>
                </td>
                <td>${customer.email}</td>
                <td>${customer.phone || 'N/A'}</td>
                <td>${customer.city || 'N/A'}</td>
                <td>${customer.total_orders || 0}</td>
                <td>${customer.created_at}</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn-icon btn-edit" onclick="openEditModal(${customer.id})" data-bs-toggle="modal" data-bs-target="#editCustomerModal">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon btn-delete" onclick="openDeleteModal(${customer.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function getInitials(name) {
        return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function saveCustomer() {
        const form = document.getElementById('addCustomerForm');
        const formData = new FormData(form);

        fetch('{{ url_for("customer_module.add_customer") }}', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert('✓ Customer added successfully!', 'success');
                const modal = bootstrap.Modal.getInstance(document.getElementById('addCustomerModal'));
                modal.hide();
                form.reset();
                customers.push(data.data);
                renderTable();
            } else {
                showAlert('✗ ' + (data.message || 'Error adding customer'), 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showAlert('✗ Error adding customer', 'error');
        });
    }

    function openEditModal(customerId) {
        const customer = customers.find(c => c.id === customerId);
        if (customer) {
            document.getElementById('editCustomerId').value = customerId;
            document.getElementById('editName').value = customer.name;
            document.getElementById('editEmail').value = customer.email;
            document.getElementById('editPhone').value = customer.phone || '';
            document.getElementById('editAddress').value = customer.address || '';
            document.getElementById('editCity').value = customer.city || '';
            document.getElementById('editCountry').value = customer.country || '';
        }
    }

    function updateCustomer() {
        const customerId = document.getElementById('editCustomerId').value;
        const form = document.getElementById('editCustomerForm');
        const formData = new FormData(form);

        fetch(`{{ url_for("customer_module.edit_customer", customer_id=0) }}`.replace('0', customerId), {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert('✓ Customer updated successfully!', 'success');
                const modal = bootstrap.Modal.getInstance(document.getElementById('editCustomerModal'));
                modal.hide();
                const index = customers.findIndex(c => c.id === parseInt(customerId));
                if (index > -1) {
                    customers[index] = data.data;
                }
                renderTable();
            } else {
                showAlert('✗ ' + (data.message || 'Error updating customer'), 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showAlert('✗ Error updating customer', 'error');
        });
    }

    function openDeleteModal(customerId) {
        Swal.fire({
            title: 'Delete Customer?',
            text: 'This action cannot be undone.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, delete it!'
        }).then((result) => {
            if (result.isConfirmed) {
                performDelete(customerId);
            }
        });
    }

    function performDelete(customerId) {
        fetch(`{{ url_for("customer_module.delete_customer", customer_id=0) }}`.replace('0', customerId), {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showAlert(data.message || 'Customer deleted successfully!', 'success');
                customers = customers.filter(c => c.id !== parseInt(customerId));
                renderTable();
            } else {
                showAlert('✗ ' + (data.message || 'Error deleting customer'), 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showAlert('✗ Error deleting customer', 'error');
        });
    }

    function confirmDelete() {
        // This function is no longer used with SweetAlert2
    }

    function showAlert(message, type) {
        Swal.fire({
            title: type === 'success' ? 'Success!' : 'Error',
            text: message,
            icon: type,
            position: 'top-end',
            toast: true,
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        })
    }
</script>
{% endblock %}
