{% extends "base.html" %}

{% block title %}Category Management - Green Bean Admin{% endblock %}

{% block content %}
<style>
    :root {
        --primary-green: #22a54a;
        --dark-green: #155724;
        --light-green: #d4edda;
        --accent-green: #1aa179;
        --text-dark: #1a1a1a;
        --text-secondary: #495057;
        --bg-light: #f8f9fa;
        --border-color: #d1d5db;
        --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f7fa;
        color: var(--text-dark);
    }

    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 260px;
        height: 100vh;
        background: linear-gradient(135deg, var(--dark-green) 0%, var(--primary-green) 100%);
        color: white;
        padding-top: 20px;
        overflow-y: auto;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
    }

    .sidebar-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        gap: 10px;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .sidebar-logo i {
        font-size: 1.2rem;
    }

    .sidebar-logo h3 {
        margin: 0;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .sidebar-menu {
        list-style: none;
        padding: 0 10px;
    }

    .sidebar-menu li {
        margin: 5px 0;
    }

    .sidebar-menu a {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        border-radius: 8px;
        transition: all 0.3s ease;
        gap: 12px;
        font-size: 0.95rem;
    }

    .sidebar-menu a:hover,
    .sidebar-menu a.active {
        background-color: rgba(255, 255, 255, 0.15);
        color: white;
        padding-left: 20px;
    }

    .sidebar-menu a.active {
        background-color: var(--accent-green);
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .sidebar-menu i {
        width: 20px;
        text-align: center;
        font-size: 1.1rem;
    }

    .main-content {
        margin-left: 290px;
        padding: 20px;
        min-height: 100vh;
    }

    .page-header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: -20px;
    }

    .page-title {
        font-size: 1.3rem;
        font-weight: 800;
        color: #000000;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .page-title i {
        color: var(--primary-green);
    }

    .filter-group {
        display: flex;
        gap: 15px;
        align-items: center;
        justify-content: space-between;
    }

    .search-box {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 1 300px;
    }

    .search-box i {
        color: #999;
    }

    .search-box input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        font-size: 0.9rem;
    }

    .search-box input:focus {
        outline: none;
        border-color: var(--primary-green);
        box-shadow: 0 0 0 3px rgba(34, 165, 74, 0.1);
    }

    .btn-add {
        background: var(--primary-green);
        color: white;
        border: none;
        padding: 10px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        text-decoration: none !important;
    }

    .btn-add:hover {
        background: var(--dark-green);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(34, 165, 74, 0.3);
    }

    .categories-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .category-card {
        background: white;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        padding: 20px;
        text-align: center;
        transition: all 0.3s ease;
    }

    .category-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .category-icon {
        font-size: 1.5rem;
        color: var(--primary-green);
        margin-bottom: 10px;
    }

    .category-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: #000000;
        margin-bottom: 8px;
    }

    .category-count {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 15px;
    }

    .category-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
    }

    .btn-icon {
        padding: 10px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1rem;
        flex: 1;
        background-color: #1aa179;
        text-decoration: none !important;
    }

    .btn-edit:hover {
        background-color: #bbdefb;
    }

    .btn-delete {
        background-color: #ffebee;
        color: #c62828;
    }

    .btn-delete:hover {
        background-color: #ffcdd2;
    }

    .modal-content {
        border: none;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .modal-header {
        background: var(--primary-green);
        color: white;
        border: none;
    }

    .modal-header .btn-close {
        filter: brightness(0) invert(1);
    }

    .form-label {
        font-weight: 600;
        color: #000000;
        margin-bottom: 8px;
    }

    .form-control,
    .form-select {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 0.9rem;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: var(--primary-green);
        box-shadow: 0 0 0 0.2rem rgba(34, 165, 74, 0.25);
    }

    .btn-primary {
        background: var(--primary-green);
        border: none;
        border-radius: 8px;
        font-weight: 600;
    }

    .btn-primary:hover {
        background: var(--dark-green);
    }

    .pagination {
        margin-top: 30px;
        gap: 5px;
    }

    .page-link {
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-dark);
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .page-link:hover {
        background-color: var(--bg-light);
        border-color: var(--primary-green);
    }

    .page-link.active {
        background-color: var(--primary-green);
        color: white;
        border-color: var(--primary-green);
    }

    @media (max-width: 768px) {
        .sidebar {
            width: 200px;
        }

        .main-content {
            margin-left: 200px;
            padding: 15px;
        }

        .categories-grid {
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        }
    }

    @media (max-width: 576px) {
        .sidebar {
            position: fixed;
            left: -260px;
        }

        .main-content {
            margin-left: 0;
        }

        .categories-grid {
            grid-template-columns: 1fr;
        }

        .page-header {
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>
<div class="main-content ms-0 me-0 px-1">
    <div class="page-header">
    <div class="filter-group">
            <form method="GET" action="{{ url_for('category_module.categories_route') }}" style="display: flex; gap: 15px; align-items: center; flex: 0 1 300px;">
                <div class="search-box" style="flex: 1; margin: 0;">
                    <i class="fas fa-search" style="color: #6c757d;"></i>
                    <input type="text" name="search" placeholder="Search categories..." value="{{ search_query or '' }}">
                </div>
            </form>
            <a href="{{ url_for('category_module.add_category_route') }}" class="btn-add" title="Add New Category">
                <i class="fas fa-plus"></i> Add Category
            </a>
        </div>
    </div>

    <div class="categories-grid">
        {% for category in categories %}
        <div class="category-card">
            <div class="category-icon">
                <i class="fas {{ category.icon }}"></i>
            </div>
            <div class="category-name">{{ category.category_name }}</div>
            <div class="category-count">{{ category.total_products }} products</div>
            <div class="category-actions">
                <a href="{{ url_for('category_module.edit_category_route', category_id=category.id) }}"
                    class="btn-icon btn-edit" title="Edit Category">
                    <i class="fas fa-edit"></i> Edit
                </a>
                <a class="btn-icon btn-delete" title="Delete Category"
                    onclick="confirmDelete(event, 'Category', '{{ category.id }}', 'categories');">
                    <i class="fas fa-trash"></i> Delete
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script>
    // Show success/error messages from redirect
    window.addEventListener('load', function () {
        const urlParams = new URLSearchParams(window.location.search);
        const message = urlParams.get('message');
        const type = urlParams.get('type');

        if (message && typeof Swal !== 'undefined') {
            Swal.fire({
                title: type === 'success' ? 'Success!' : 'Error!',
                text: message,
                icon: type === 'success' ? 'success' : 'error',
                confirmButtonColor: '#22a54a',
                confirmButtonText: 'OK'
            });
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });
</script>

{% endblock %}
