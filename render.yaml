services:
  - type: web
    name: greenbean-dashboard
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade ; gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: FLASK_SECRET_KEY
        generateValue: true

# Attach a Render PostgreSQL database in the dashboard and set DATABASE_URL
# as an environment variable for this web service.
